<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dek Wen Outfit — v15 (Local First + Cloud Sync แน่น)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, 'Kanit', sans-serif; background: #0D0A14; color: #F5F0FF; font-size: 14px; transition: background 0.2s; }
        body.light { background: #F3EFFA; color: #1A1424; }
        .app { max-width: 800px; margin: 0 auto; padding: 12px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 12px; border-bottom: 1px solid #2A2038; padding-bottom: 8px; }
        .logo { font-size: 22px; font-weight: 900; background: linear-gradient(135deg, #C9A6FF, #A855F7); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .ver { font-family: monospace; background: #241A33; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #C9A6FF; }
        .nav { display: flex; gap: 6px; flex-wrap: wrap; background: #1A1424; border-radius: 14px; padding: 6px; margin-bottom: 16px; }
        .nav button { flex: 1; padding: 8px; background: transparent; border: none; color: #A99BC4; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .nav button.active { background: linear-gradient(135deg, #7C3AED, #A855F7); color: white; box-shadow: 0 2px 8px rgba(168,85,247,0.4); }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: #1A1424; border: 1px solid #2A2038; border-radius: 14px; padding: 1rem; margin-bottom: 12px; position: relative; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #A855F7, transparent); border-radius: 14px 14px 0 0; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 8px; margin-bottom: 12px; }
        .stat { background: #241A33; border-radius: 12px; padding: 10px; border-left: 4px solid #A855F7; }
        .stat-label { font-size: 11px; color: #A99BC4; text-transform: uppercase; }
        .stat-val { font-size: 20px; font-weight: 700; font-family: monospace; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 8px; background: #241A33; border: 1px solid #3A2D52; border-radius: 8px; color: white; }
        .btn { padding: 8px 16px; border-radius: 8px; background: #2A2038; border: none; color: white; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #7C3AED, #A855F7); }
        .btn-danger { background: #FF5C7A; color: #1A1424; }
        .btn-sm { padding: 4px 12px; font-size: 12px; }
        .info-box { background: rgba(168,85,247,0.2); border-left: 4px solid #A855F7; padding: 8px; margin-bottom: 8px; border-radius: 8px; }
        .warning-box { background: rgba(255,193,7,0.2); border-left-color: #FFC107; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #D6FF3D; color: #000; padding: 6px 16px; border-radius: 30px; font-size: 13px; z-index: 999; }
        .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; background: #3A2D52; }
        .room-setup { background: #241A33; border-radius: 12px; padding: 10px; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .migrate-bar { background: #2A2038; border: 1px solid #FFC107; border-radius: 8px; padding: 8px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #3A2D52; }
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <div class="logo">DEK WEN OUTFIT</div>
        <div class="ver">v15 🔁 Local First + Cloud Sync</div>
    </div>
    <div class="nav">
        <button class="active" onclick="showTab('home')">🏠 หน้าแรก</button>
        <button onclick="showTab('lot')">📦 ล็อต</button>
        <button onclick="showTab('sell')">💰 ขาย</button>
        <button onclick="showTab('summary')">📊 สรุป</button>
        <button onclick="showTab('igposts')">📋 โพสต์ไอจี</button>
        <button onclick="showTab('settings')">⚙️ ตั้งค่า</button>
    </div>

    <!-- Room setup bar -->
    <div class="room-setup">
        <span>🔑 รหัสกลุ่ม:</span>
        <input type="text" id="roomIdInput" placeholder="เช่น dekwenA1" style="width: 160px;">
        <button class="btn btn-sm btn-primary" onclick="joinRoom()">เข้ากลุ่ม</button>
        <div id="roomStatus" style="font-size: 12px;">⚠️ ยังไม่ได้เชื่อมต่อ</div>
        <span id="dataSourceBadge" class="status-badge">📍 Local</span>
    </div>
    <!-- Migration bar (แสดงเฉพาะเมื่อ local มีข้อมูล แต่ cloud ว่าง) -->
    <div id="migrateBar" style="display:none;" class="migrate-bar">
        <span>📦 พบข้อมูลในเครื่อง (Local) ยังไม่ได้อัปโหลดขึ้นคลาวด์</span>
        <button class="btn btn-sm btn-primary" onclick="migrateLocalToCloud()">☁️ อัปโหลดขึ้นคลาวด์</button>
    </div>

    <!-- หน้าแรก -->
    <div id="home" class="section active">
        <div id="alertArea"></div>
        <div class="stat-grid" id="statsGrid"></div>
        <div class="card"><h3>ล็อตล่าสุด</h3><div id="recentLots"></div></div>
    </div>

    <!-- ล็อต -->
    <div id="lot" class="section">
        <div class="card">
            <div class="form-row"><input id="lotName" placeholder="ชื่อล็อต"><input id="lotTotal" type="number" placeholder="จำนวนเสื้อทั้งหมด"></div>
            <div class="form-row"><input id="lotCost" type="number" placeholder="ราคาซื้อ (฿)"><input id="lotShip" type="number" placeholder="ค่าขนส่ง"></div>
            <div class="form-row"><input id="lotPack" type="number" placeholder="ค่าบรรจุ"><input id="lotWeight" type="number" placeholder="น้ำหนัก (กก.)"></div>
            <div><label>หมวดเสื้อในล็อตนี้</label><div id="shirtCats"></div></div>
            <button class="btn btn-primary" onclick="addLot()">➕ เพิ่มล็อต</button>
        </div>
        <div class="card"><h3>🔍 ค้นหาล็อต</h3><input type="text" id="searchLot" placeholder="พิมพ์ชื่อล็อต..." oninput="renderLots()"></div>
        <div id="lotList"></div>
    </div>

    <!-- ขาย -->
    <div id="sell" class="section">
        <div class="card">
            <div class="form-row"><select id="sellLot" onchange="updateShirtSelect()"></select><select id="sellShirt"></select></div>
            <div class="form-row"><input id="sellQty" type="number" value="1"><input id="sellPrice" type="number" placeholder="ราคา/ตัว"></div>
            <div class="form-row"><input id="customerName" placeholder="ชื่อลูกค้า"><input id="customerContact" placeholder="@line/ig"></div>
            <div><input id="extraDetails" placeholder="ไซส์/แบรนด์/สภาพ"></div>
            <div id="sellCostPreview"></div><div id="profitPreview"></div>
            <button class="btn btn-primary" onclick="addSale()">✅ บันทึกการขาย</button>
            <hr><button class="btn" onclick="openScanner()">📷 สแกน QR (ล็อต)</button>
            <div id="qrReader" style="display:none; margin-top:8px;"></div>
        </div>
        <div class="card"><h3>ประวัติการขาย</h3><div id="saleList"></div></div>
    </div>

    <!-- สรุป -->
    <div id="summary" class="section">
        <div id="summaryContent"></div>
        <div class="card"><canvas id="dailyChart" width="400" height="180"></canvas></div>
        <div class="card"><canvas id="catChart" width="400" height="180"></canvas></div>
    </div>

    <!-- โพสต์ไอจี -->
    <div id="igposts" class="section">
        <div class="card">
            <textarea id="igTemplate" rows="2" placeholder="เทมเพลต {ชื่อ} {ราคา} {ไซส์} {แบรนด์} {สภาพ}"></textarea>
            <div class="form-row"><input id="varName" placeholder="ชื่อ"><input id="varPrice" placeholder="ราคา"></div>
            <div class="form-row"><input id="varSize" placeholder="ไซส์"><input id="varBrand" placeholder="แบรนด์"></div>
            <input id="varCondition" placeholder="สภาพ">
            <button class="btn btn-sm" onclick="applyTemplate()">✨ แปลง</button>
            <textarea id="igContent" rows="3" placeholder="ข้อความโพสต์"></textarea>
            <div class="form-row"><input id="igTitle" placeholder="ชื่อโพสต์"></div>
            <button class="btn btn-primary" onclick="addIgPost()">💾 บันทึกโพสต์</button>
        </div>
        <div><h3>⏳ รอลง</h3><div id="igPending"></div></div>
        <div><h3>✅ ลงแล้ว</h3><div id="igPosted"></div></div>
    </div>

    <!-- ตั้งค่า -->
    <div id="settings" class="section">
        <div class="card">
            <h3>☁️ Firebase Config</h3>
            <textarea id="firebaseConfigInput" rows="6" style="font-family: monospace;"></textarea>
            <button class="btn btn-primary" onclick="testAndSaveConfig()">💾 ทดสอบและบันทึก Config</button>
            <div id="configTestResult" class="info-box" style="margin-top:8px;"></div>
        </div>
        <div class="card">
            <h3>🤖 Discord Webhook</h3>
            <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
            <div><label><input type="checkbox" id="notifySale" checked> แจ้งขาย</label></div>
            <div><label><input type="checkbox" id="notifyLot" checked> แจ้งเพิ่มล็อต</label></div>
            <div><label><input type="checkbox" id="notifyStale" checked> แจ้งสินค้าค้าง</label></div>
            <button class="btn btn-sm" onclick="testWebhook()">ทดสอบ Discord</button>
        </div>
        <div class="card"><h3>หมวดเสื้อ</h3><div id="catManage"></div><div class="form-row"><input id="newCat" placeholder="หมวดใหม่"><button class="btn btn-sm" onclick="addCategory()">เพิ่ม</button></div></div>
        <div class="card"><button class="btn" onclick="exportCloudData()">📥 Export JSON</button> <button class="btn" onclick="exportCSV()">📊 Export CSV</button></div>
        <div class="card"><button class="btn btn-danger" onclick="clearAllCloud()">⚠️ ล้างข้อมูลทั้งหมดในกลุ่ม</button></div>
    </div>
</div>

<script>
// --------------------------------------------------------------
// GLOBALS & HELPERS
// --------------------------------------------------------------
let DB = { lots: [], sales: [], categories: [], igPosts: [] };
let firestore = null;
let currentRoom = null;
let unsubLots, unsubSales, unsubIg, unsubCats;
let webhookUrl = "", notify = { sale: true, lot: true, stale: true };
let isCloudConnected = false;
let hasCloudData = false;   // flag เพื่อไม่ให้ cloud ทับ local
const DEFAULT_CATS = ["เสื้อยืดคอกลม","เสื้อโปโล","เสื้อฮู้ด","เสื้อแจ็คเก็ต","เสื้อวินเทจ","แบรนด์เนม"];

function fmt(n) { return Math.round(n).toLocaleString('th-TH') + '฿'; }
function fmtN(n) { return Math.round(n).toLocaleString('th-TH'); }
function cpu(lot) { return (lot.cost+lot.ship+lot.pack)/(lot.totalShirts||1); }
function soldOf(lotId) { return DB.sales.filter(s=>s.lotId===lotId).reduce((a,s)=>a+s.qty,0); }
function revenueOf(lotId) { return DB.sales.filter(s=>s.lotId===lotId).reduce((a,s)=>a+s.qty*s.price,0); }
function showToast(msg) { let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

// บันทึก localStorage เสมอ (fallback)
function saveLocal() {
    localStorage.setItem('dwo_data', JSON.stringify({ lots: DB.lots, sales: DB.sales, categories: DB.categories, igPosts: DB.igPosts }));
}
function loadLocal() {
    let raw = localStorage.getItem('dwo_data');
    if (raw) {
        try {
            let data = JSON.parse(raw);
            DB.lots = data.lots || [];
            DB.sales = data.sales || [];
            DB.categories = data.categories || [];
            DB.igPosts = data.igPosts || [];
        } catch(e) { console.warn(e); }
    }
    if (!DB.categories.length) DB.categories = [...DEFAULT_CATS];
    renderAll();
}

// --------------------------------------------------------------
// RENDER ALL UI
// --------------------------------------------------------------
function renderAll() {
    renderStats();
    renderLots();
    renderSales();
    renderSummary();
    renderLotSelect();
    renderCatManage();
    renderShirtCats();
    renderIgPosts();
    renderAlerts();
    renderCharts();
    // ตรวจสอบ migration bar
    const hasLocalData = (DB.lots.length > 0 || DB.sales.length > 0 || DB.igPosts.length > 0);
    const migrateBar = document.getElementById('migrateBar');
    if (isCloudConnected && currentRoom && hasLocalData && !hasCloudData) {
        migrateBar.style.display = 'flex';
    } else {
        migrateBar.style.display = 'none';
    }
    // อัปเดต badge แหล่งข้อมูล
    let badge = document.getElementById('dataSourceBadge');
    if (isCloudConnected && hasCloudData) badge.innerText = '☁️ Cloud';
    else if (isCloudConnected && !hasCloudData && hasLocalData) badge.innerText = '📍 Local (รออัปโหลด)';
    else if (!isCloudConnected) badge.innerText = '📍 Local only';
    else badge.innerText = '📍 Local';
}

function renderStats() {
    let totalShirts = DB.lots.reduce((a,l)=>a+(l.totalShirts||0),0);
    let sold = DB.sales.reduce((a,s)=>a+s.qty,0);
    let rev = DB.sales.reduce((a,s)=>a+s.qty*s.price,0);
    let totalCost = DB.lots.reduce((a,l)=>a+l.cost+l.ship+l.pack,0);
    let profit = rev - DB.sales.reduce((a,s)=>{ let lot=DB.lots.find(l=>l.id===s.lotId); let c=lot?cpu(lot):0; return a+s.qty*c; },0);
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat"><div class="stat-label">ล็อต</div><div class="stat-val">${DB.lots.length}</div></div>
        <div class="stat"><div class="stat-label">เสื้อทั้งหมด</div><div class="stat-val">${fmtN(totalShirts)}</div></div>
        <div class="stat"><div class="stat-label">ขายแล้ว</div><div class="stat-val">${fmtN(sold)}</div></div>
        <div class="stat"><div class="stat-label">รอขาย</div><div class="stat-val">${fmtN(Math.max(0,totalShirts-sold))}</div></div>
        <div class="stat"><div class="stat-label">รายได้</div><div class="stat-val">${fmt(rev)}</div></div>
        <div class="stat"><div class="stat-label">กำไรสุทธิ</div><div class="stat-val">${profit>=0?'+':''}${fmt(profit)}</div></div>
    `;
    let recent = DB.lots.slice(-3).reverse().map(l=>`<div>📦 ${l.name} ขาย ${fmtN(soldOf(l.id))}/${fmtN(l.totalShirts||0)}</div>`).join('');
    document.getElementById('recentLots').innerHTML = recent || '<div class="info-box">ยังไม่มีล็อต</div>';
}

function renderLots() {
    let filter = document.getElementById('searchLot')?.value.toLowerCase()||'';
    let filtered = DB.lots.filter(l=>l.name.toLowerCase().includes(filter));
    let html = filtered.map(l=>{
        let cost = l.cost+l.ship+l.pack;
        let profit = revenueOf(l.id)-cost;
        return `<div style="background:#241A33; margin-bottom:8px; padding:8px; border-radius:8px;">
            <div><b>${l.name}</b> (${fmtN(l.totalShirts)} ตัว) ต้นทุน/ตัว ${fmt(cpu(l))}</div>
            <div>ขาย ${fmtN(soldOf(l.id))} ตัว กำไร ${profit>=0?'+':''}${fmt(profit)}</div>
            <button class="btn btn-sm btn-danger" onclick="deleteLot('${l.id}')">ลบล็อต</button>
        </div>`;
    }).join('');
    document.getElementById('lotList').innerHTML = html || '<div class="info-box">ไม่มีล็อต</div>';
}

function renderSales() {
    let html = DB.sales.slice().reverse().map(s=>{
        let lot = DB.lots.find(l=>l.id===s.lotId);
        return `<div style="border-bottom:1px solid #3A2D52; padding:6px 0;"><b>${lot?.name||'?'}</b> ${s.shirt} x${s.qty} = ${fmt(s.qty*s.price)}<br><span class="badge">👤 ${s.customer||'-'} (${s.contact||'-'})</span> <button class="btn btn-sm btn-danger" onclick="deleteSale('${s.id}')">🗑️</button></div>`;
    }).join('');
    document.getElementById('saleList').innerHTML = html || '<div class="info-box">ยังไม่มีรายการขาย</div>';
}

function renderSummary() {
    let totalRev = DB.sales.reduce((a,s)=>a+s.qty*s.price,0);
    let totalCostSold = DB.sales.reduce((a,s)=>{ let lot=DB.lots.find(l=>l.id===s.lotId); let c=lot?cpu(lot):0; return a+s.qty*c; },0);
    document.getElementById('summaryContent').innerHTML = `<div class="card"><div class="stat-label">รายได้รวม</div><div>${fmt(totalRev)}</div><div class="stat-label">ต้นทุนที่ขายแล้ว</div><div>${fmt(totalCostSold)}</div><div class="stat-label">กำไรสุทธิ</div><div>${fmt(totalRev-totalCostSold)}</div></div>`;
}

function renderLotSelect() {
    let sel = document.getElementById('sellLot');
    sel.innerHTML = '<option value="">— เลือกล็อต —</option>'+DB.lots.map(l=>`<option value="${l.id}">${l.name} (ต้นทุน ${fmt(cpu(l))})</option>`).join('');
    updateShirtSelect();
}
function updateShirtSelect() {
    let lotId = document.getElementById('sellLot').value;
    let lot = DB.lots.find(l=>l.id===lotId);
    let cats = lot?.categories?.length ? lot.categories : DB.categories;
    document.getElementById('sellShirt').innerHTML = '<option value="">— หมวด —</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    let preview = document.getElementById('sellCostPreview');
    if(lot) preview.innerHTML = `<div class="info-box">ต้นทุน/ตัว ${fmt(cpu(lot))} · เสื้อในล็อต ${fmtN(lot.totalShirts)} ตัว</div>`;
    else preview.innerHTML = '';
    previewProfit();
}
function previewProfit() {
    let lotId = document.getElementById('sellLot').value;
    let lot = DB.lots.find(l=>l.id===lotId);
    let price = parseFloat(document.getElementById('sellPrice').value)||0;
    let pDiv = document.getElementById('profitPreview');
    if(lot && price) pDiv.innerHTML = `<div class="info-box">กำไร/ตัว: ${price>=cpu(lot)?'+':''}${fmt(price-cpu(lot))}</div>`;
    else pDiv.innerHTML = '';
}
function renderCatManage() {
    let cats = DB.categories.length ? DB.categories : DEFAULT_CATS;
    document.getElementById('catManage').innerHTML = cats.map((c,i)=>`<div style="display:flex; justify-content:space-between; margin:4px 0;">${c}<button class="btn btn-sm btn-danger" onclick="removeCat(${i})">ลบ</button></div>`).join('');
}
function renderShirtCats() {
    let cats = DB.categories.length ? DB.categories : DEFAULT_CATS;
    document.getElementById('shirtCats').innerHTML = cats.map(c=>`<label><input type="checkbox" value="${c}"> ${c}</label>`).join(' ');
}
function renderIgPosts() {
    let pending = DB.igPosts.filter(p=>p.status==='pending');
    let posted = DB.igPosts.filter(p=>p.status==='posted');
    document.getElementById('igPending').innerHTML = pending.map(p=>`<div class="info-box"><b>${p.title}</b><br>${p.content.substring(0,80)}...<br><button class="btn btn-sm" onclick="copyText('${p.id}')">📋 ก็อบ</button> <button class="btn btn-sm btn-primary" onclick="togglePostStatus('${p.id}')">✅ ลงแล้ว</button> <button class="btn btn-sm btn-danger" onclick="deleteIgPost('${p.id}')">🗑️</button></div>`).join('')||'<div class="info-box">ไม่มี</div>';
    document.getElementById('igPosted').innerHTML = posted.map(p=>`<div class="info-box"><b>✅ ${p.title}</b><br>${p.content.substring(0,80)}...<br><button class="btn btn-sm" onclick="copyText('${p.id}')">📋 ก็อบ</button> <button class="btn btn-sm" onclick="togglePostStatus('${p.id}')">🔄 เปลี่ยนเป็นยังไม่ลง</button> <button class="btn btn-sm btn-danger" onclick="deleteIgPost('${p.id}')">🗑️</button></div>`).join('')||'<div class="info-box">ไม่มี</div>';
}
function copyText(id) { let p=DB.igPosts.find(p=>p.id===id); if(p) { navigator.clipboard.writeText(p.content); showToast('ก็อบแล้ว'); } }
async function togglePostStatus(id) { let p=DB.igPosts.find(p=>p.id===id); if(p&&firestore&&currentRoom) await firestore.collection('rooms').doc(currentRoom).collection('igPosts').doc(id).update({status: p.status==='pending'?'posted':'pending'}); else showToast('ไม่สามารถเปลี่ยนได้'); renderAll(); }
async function deleteIgPost(id) { if(confirm('ลบโพสต์?')) { if(firestore&&currentRoom) await firestore.collection('rooms').doc(currentRoom).collection('igPosts').doc(id).delete(); else { DB.igPosts = DB.igPosts.filter(p=>p.id!==id); saveLocal(); } renderAll(); } }
function renderAlerts() {
    let alerts = [];
    let now = new Date();
    DB.lots.forEach(lot=>{
        if(lot.date){
            let days = (now - new Date(lot.date))/(1000*3600*24);
            let soldPct = (soldOf(lot.id)/(lot.totalShirts||1))*100;
            if(days>30 && soldPct<30) alerts.push(`⚠️ ล็อต "${lot.name}" ผ่านมา ${Math.floor(days)} วัน ขายได้ ${soldPct.toFixed(0)}%`);
        }
    });
    document.getElementById('alertArea').innerHTML = alerts.length ? `<div class="info-box" style="border-left-color:#FF5C7A;">${alerts.join('<br>')}</div>` : '';
    if(alerts.length && notify.stale && webhookUrl) sendDiscord(`📦 สินค้าค้างสต๊อก:\n${alerts.join('\n')}`);
}
let dailyChart, catChart;
function renderCharts() {
    let last7 = [...Array(7)].map((_,i)=>{ let d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10); }).reverse();
    let dailyRev = last7.map(day=>DB.sales.filter(s=>s.date?.slice(0,10)===day).reduce((a,s)=>a+s.qty*s.price,0));
    let ctx = document.getElementById('dailyChart')?.getContext('2d');
    if(ctx){ if(dailyChart) dailyChart.destroy(); dailyChart = new Chart(ctx, { type:'line', data:{ labels:last7.map(d=>d.slice(5)), datasets:[{label:'รายได้ (บาท)', data:dailyRev, borderColor:'#A855F7'}] } }); }
    let catProfit = {};
    DB.sales.forEach(s=>{ let lot=DB.lots.find(l=>l.id===s.lotId); let c=lot?cpu(lot):0; let profit=(s.price-c)*s.qty; let cat=s.shirt||'อื่นๆ'; catProfit[cat]=(catProfit[cat]||0)+profit; });
    let catCtx = document.getElementById('catChart')?.getContext('2d');
    if(catCtx){ if(catChart) catChart.destroy(); catChart = new Chart(catCtx, { type:'bar', data:{ labels:Object.keys(catProfit), datasets:[{label:'กำไร', data:Object.values(catProfit), backgroundColor:'#7C3AED'}] } }); }
}

async function addLot() {
    let name = document.getElementById('lotName').value.trim();
    let total = parseInt(document.getElementById('lotTotal').value);
    if(!name || !total) { alert('ใส่ชื่อและจำนวนเสื้อ'); return; }
    let cats = [...document.querySelectorAll('#shirtCats input:checked')].map(i=>i.value);
    let newLot = {
        id: Date.now().toString(),
        name, totalShirts: total,
        cost: parseFloat(document.getElementById('lotCost').value)||0,
        ship: parseFloat(document.getElementById('lotShip').value)||0,
        pack: parseFloat(document.getElementById('lotPack').value)||0,
        weight: parseFloat(document.getElementById('lotWeight').value)||0,
        categories: cats,
        date: new Date().toISOString()
    };
    DB.lots.push(newLot);
    saveLocal();
    if(firestore && currentRoom) {
        try {
            await firestore.collection('rooms').doc(currentRoom).collection('lots').doc(newLot.id).set(newLot);
            showToast('✅ บันทึกลงคลาวด์แล้ว');
            if(notify.lot && webhookUrl) sendDiscord(`📦 เพิ่มล็อต: ${name} (${total} ตัว)`);
        } catch(e) { showToast('⚠️ บันทึก local แล้ว แต่คลาวด์ล้มเหลว'); }
    } else showToast('💾 บันทึกไว้ในเครื่อง (offline)');
    clearLotForm();
    renderAll();
}
function clearLotForm() {
    ['lotName','lotTotal','lotCost','lotShip','lotPack','lotWeight'].forEach(id=>document.getElementById(id).value='');
    document.querySelectorAll('#shirtCats input').forEach(cb=>cb.checked=false);
}
async function deleteLot(lotId) {
    if(!confirm('ลบล็อต? ยอดขายจะหายด้วย')) return;
    DB.lots = DB.lots.filter(l=>l.id!==lotId);
    DB.sales = DB.sales.filter(s=>s.lotId!==lotId);
    saveLocal();
    if(firestore && currentRoom) {
        try {
            let batch = firestore.batch();
            let salesSnap = await firestore.collection('rooms').doc(currentRoom).collection('sales').where('lotId','==',lotId).get();
            salesSnap.forEach(d=>batch.delete(d.ref));
            batch.delete(firestore.collection('rooms').doc(currentRoom).collection('lots').doc(lotId));
            await batch.commit();
        } catch(e) { console.warn(e); }
    }
    renderAll();
}
async function addSale() {
    let lotId = document.getElementById('sellLot').value;
    let shirt = document.getElementById('sellShirt').value;
    let qty = parseInt(document.getElementById('sellQty').value)||1;
    let price = parseFloat(document.getElementById('sellPrice').value)||0;
    let customer = document.getElementById('customerName').value;
    let contact = document.getElementById('customerContact').value;
    let details = document.getElementById('extraDetails').value;
    if(!lotId || !price) { alert('เลือกล็อตและใส่ราคา'); return; }
    let newSale = { id: Date.now().toString(), lotId, shirt, qty, price, date: new Date().toISOString(), customer, contact, details };
    DB.sales.push(newSale);
    saveLocal();
    if(firestore && currentRoom) {
        try {
            await firestore.collection('rooms').doc(currentRoom).collection('sales').doc(newSale.id).set(newSale);
            showToast('✅ บันทึกการขายลงคลาวด์');
            if(notify.sale && webhookUrl) sendDiscord(`💰 ขาย: ${DB.lots.find(l=>l.id===lotId)?.name} ${shirt} ${qty} ตัว รวม ${fmt(qty*price)}`);
        } catch(e) { showToast('⚠️ บันทึก local แล้ว แต่คลาวด์ล้มเหลว'); }
    } else showToast('💾 บันทึกไว้ในเครื่อง');

    renderAll();
}
function clearSaleForm() {

    document.getElementById('customerContact').value='';
    document.getElementById('extraDetails').value='';
    document.getElementById('sellQty').value='1';
}
async function deleteSale(saleId) {

        saveLocal();
        if(firestore && currentRoom) await firestore.collection('rooms').doc(currentRoom).collection('sales').doc(saleId).delete();

async function addCategory() {

    saveLocal();

}
async function removeCat(idx) {
    DB.categories.splice(idx,1);
    saveLocal();
    if(firestore && currentRoom) await firestore.collection('rooms').doc(currentRoom).collection('meta').doc('categories').set({ list: DB.categories });

async function addIgPost() {
    let title = document.getElementById('igTitle').value.trim();
    let content = document.getElementById('igContent').value.trim();
    if(!content) return;
    let newPost = { id: Date.now().toString(), title: title||'โพสต์', content, status: 'pending', date: new Date().toISOString() };
    DB.igPosts.push(newPost);
    saveLocal();
    if(firestore && currentRoom) await firestore.collection('rooms').doc(currentRoom).collection('igPosts').doc(newPost.id).set(newPost);

function applyTemplate() {
    let tmpl = document.getElementById('igTemplate').value;
    if(!tmpl) tmpl = "{แบรนด์} ไซส์{ไซส์} สภาพ{สภาพ} ราคา{ราคา} บาท";
    let text = tmpl.replace(/{ชื่อ}/g, document.getElementById('varName').value)
        .replace(/{ราคา}/g, document.getElementById('varPrice').value)
        .replace(/{ไซส์}/g, document.getElementById('varSize').value)

        .replace(/{สภาพ}/g, document.getElementById('varCondition').value);

}

async function testAndSaveConfig() {
    let raw = document.getElementById('firebaseConfigInput').value.trim();
    if(!raw) { alert('กรุณาใส่ JSON Config'); return; }
    let config;
    try { config = JSON.parse(raw); } catch(e) { alert('JSON ไม่ถูกต้อง'); return; }
    if(!config.apiKey || !config.projectId) { alert('Missing apiKey or projectId'); return; }
    let testApp;
    try {
        testApp = firebase.initializeApp(config, 'test');
        let testDb = firebase.firestore(testApp);
        await testDb.collection('test_write').doc('test').set({ ok: true });
        await testDb.collection('test_write').doc('test').delete();
        document.getElementById('configTestResult').innerHTML = '✅ Config ถูกต้อง สามารถเขียน Firestore ได้';
        let settings = { webhookUrl, notify, firebaseConfig: config };
        localStorage.setItem('dwo_cloud_settings', JSON.stringify(settings));
        showToast('บันทึก Config สำเร็จ');
        testApp.delete();
        setTimeout(()=>location.reload(), 1000);
    } catch(err) {
        document.getElementById('configTestResult').innerHTML = `❌ Error: ${err.message}<br>ตรวจสอบ Security Rules (ต้อง allow read, write: if true)`;
    }
}
function loadLocalSettings() {
    let raw = localStorage.getItem('dwo_cloud_settings');
    if(raw) {
        try {
            let s = JSON.parse(raw);
            if(s.webhookUrl) webhookUrl = s.webhookUrl;
            if(s.notifySettings) notify = s.notifySettings;
            if(s.firebaseConfig) document.getElementById('firebaseConfigInput').value = JSON.stringify(s.firebaseConfig, null, 2);
        } catch(e) {}
    }
    document.getElementById('webhookUrl').value = webhookUrl;
    document.getElementById('notifySale').checked = notify.sale;
    document.getElementById('notifyLot').checked = notify.lot;
    document.getElementById('notifyStale').checked = notify.stale;
}
function saveWebhookSettings() {
    webhookUrl = document.getElementById('webhookUrl').value;
    notify = {
        sale: document.getElementById('notifySale').checked,
        lot: document.getElementById('notifyLot').checked,
        stale: document.getElementById('notifyStale').checked
    };
    let oldConfig = null;
    try { oldConfig = JSON.parse(localStorage.getItem('dwo_cloud_settings'))?.firebaseConfig; } catch(e) {}
    localStorage.setItem('dwo_cloud_settings', JSON.stringify({ webhookUrl, notifySettings: notify, firebaseConfig: oldConfig }));

// --------------------------------------------------------------
// JOIN ROOM (Local First) ไม่ให้ cloud ทับ local
// --------------------------------------------------------------
async function joinRoom() {
    let room = document.getElementById('roomIdInput').value.trim();
    if(!room) { alert('กรอกรหัสกลุ่ม'); return; }
    let settingsRaw = localStorage.getItem('dwo_cloud_settings');
    let config = null;
    if(settingsRaw) {
        try { config = JSON.parse(settingsRaw).firebaseConfig; } catch(e) {}
    }
    if(!config) { alert('⚠️ ยังไม่มี Firebase Config กรุณาบันทึกในแท็บตั้งค่าก่อน'); return; }
    if(firebase.apps.length===0) firebase.initializeApp(config);
    let db = firebase.firestore();
    firestore = db;
    currentRoom = room;
    document.getElementById('roomStatus').innerHTML = '🔄 กำลังเชื่อมต่อ...';
    isCloudConnected = true;
    hasCloudData = false;
    // ตั้งค่า listeners แต่ไม่ทับ local ทันที
    if(unsubLots) unsubLots();
    if(unsubSales) unsubSales();
    if(unsubIg) unsubIg();
    if(unsubCats) unsubCats();
    // ดึงข้อมูลจาก Firestore มา merge กับ local (ถ้ามี)
    let lotsSnap = await db.collection('rooms').doc(room).collection('lots').get();
    let salesSnap = await db.collection('rooms').doc(room).collection('sales').get();
    let igSnap = await db.collection('rooms').doc(room).collection('igPosts').get();
    let catDoc = await db.collection('rooms').doc(room).collection('meta').doc('categories').get();
    let cloudLots = lotsSnap.docs.map(d=>d.data());
    let cloudSales = salesSnap.docs.map(d=>d.data());
    let cloudIg = igSnap.docs.map(d=>d.data());
    let cloudCats = catDoc.exists ? catDoc.data().list : [];
    if(cloudLots.length > 0 || cloudSales.length > 0 || cloudIg.length > 0 || cloudCats.length > 0) {
        hasCloudData = true;
        // รวมข้อมูล: ถ้า local มี แต่ cloud ไม่มี ให้ใช้ local
        // ง่ายสุด: ถ้า cloud มีข้อมูล ให้ใช้ cloud ทั้งหมด (เพราะถือว่าเป็น master)
        // แต่ถ้า local มีข้อมูลและ cloud ว่าง ให้คง local ไว้
        DB.lots = cloudLots;
        DB.sales = cloudSales;
        DB.igPosts = cloudIg;
        DB.categories = cloudCats.length ? cloudCats : DEFAULT_CATS;
        saveLocal();
        showToast('📡 โหลดข้อมูลจากคลาวด์แล้ว');
    } else {
        hasCloudData = false;
        // ถ้า cloud ว่าง ให้คง local ไว้ (ไม่ทำอะไร)
        showToast('📁 ยังไม่มีข้อมูลบนคลาวด์ ใช้ข้อมูลในเครื่อง');
    }
    renderAll();
    // ตั้งค่า real-time listeners (แต่จะอัปเดต UI โดยอัตโนมัติ)
    unsubLots = db.collection('rooms').doc(room).collection('lots').onSnapshot(snap=>{
        if(hasCloudData) {
            DB.lots = snap.docs.map(d=>d.data());
            saveLocal();
            renderAll();
        }
    });
    unsubSales = db.collection('rooms').doc(room).collection('sales').onSnapshot(snap=>{
        if(hasCloudData) {
            DB.sales = snap.docs.map(d=>d.data());
            saveLocal();
            renderAll();
        }
    });
    unsubIg = db.collection('rooms').doc(room).collection('igPosts').onSnapshot(snap=>{
        if(hasCloudData) {
            DB.igPosts = snap.docs.map(d=>d.data());
            saveLocal();
            renderAll();
        }
    });
    unsubCats = db.collection('rooms').doc(room).collection('meta').doc('categories').onSnapshot(doc=>{
        if(hasCloudData && doc.exists) {
            DB.categories = doc.data().list || DEFAULT_CATS;
            saveLocal();
            renderAll();
        }
    });
    document.getElementById('roomStatus').innerHTML = `✅ ห้อง: ${room} (เรียลไทม์)`;
    localStorage.setItem('dwo_last_room', room);
}
// อัปโหลด local ขึ้น cloud (เมื่อมี local data แต่ cloud ว่าง)
async function migrateLocalToCloud() {
    if(!firestore || !currentRoom) { alert('ยังไม่ได้เชื่อมต่อ Firebase'); return; }
    if(DB.lots.length === 0 && DB.sales.length === 0 && DB.igPosts.length === 0) {
        alert('ไม่มีข้อมูล local ที่จะอัปโหลด');
        return;
    }
    try {
        let batch = firestore.batch();
        let roomRef = firestore.collection('rooms').doc(currentRoom);
        DB.lots.forEach(lot => {
            let ref = roomRef.collection('lots').doc(lot.id);
            batch.set(ref, lot);
        });
        DB.sales.forEach(sale => {
            let ref = roomRef.collection('sales').doc(sale.id);
            batch.set(ref, sale);
        });
        DB.igPosts.forEach(post => {
            let ref = roomRef.collection('igPosts').doc(post.id);
            batch.set(ref, post);
        });
        let catRef = roomRef.collection('meta').doc('categories');
        batch.set(catRef, { list: DB.categories });
        await batch.commit();
        showToast('✅ อัปโหลดข้อมูล local ขึ้นคลาวด์เรียบร้อย');
        hasCloudData = true;
        document.getElementById('migrateBar').style.display = 'none';
        renderAll();
    } catch(err) {
        alert('อัปโหลดล้มเหลว: '+err.message);
    }
}

function exportCSV() {
    let rows = [['วันที่','ล็อต','หมวด','จำนวน','ราคา','ลูกค้า']];
    DB.sales.forEach(s=>{
        let lot = DB.lots.find(l=>l.id===s.lotId);
        rows.push([s.date?.slice(0,10)||'', lot?.name||'', s.shirt||'', s.qty, s.price, s.customer||'']);
    });
    let csv = rows.map(r=>r.join(',')).join('\n');
    let a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'sales.csv';
    a.click();
}
async function clearAllCloud() {
    if(!confirm('⚠️ ล้างข้อมูลทั้งหมดในกลุ่มนี้? ไม่สามารถกู้คืนได้')) return;
    if(firestore && currentRoom) {
        let batch = firestore.batch();
        let lotsSnap = await firestore.collection('rooms').doc(currentRoom).collection('lots').get();
        lotsSnap.forEach(d=>batch.delete(d.ref));
        let salesSnap = await firestore.collection('rooms').doc(currentRoom).collection('sales').get();
        salesSnap.forEach(d=>batch.delete(d.ref));
        let igSnap = await firestore.collection('rooms').doc(currentRoom).collection('igPosts').get();
        igSnap.forEach(d=>batch.delete(d.ref));
        await firestore.collection('rooms').doc(currentRoom).collection('meta').doc('categories').delete();
        await batch.commit();
        DB.lots = []; DB.sales = []; DB.igPosts = []; DB.categories = [...DEFAULT_CATS];
        saveLocal();
        hasCloudData = false;
        renderAll();
        showToast('ล้างข้อมูลคลาวด์และ local แล้ว');
    } else {
        DB.lots = []; DB.sales = []; DB.igPosts = []; DB.categories = [...DEFAULT_CATS];
        saveLocal();
        renderAll();
    }
}

}

let scanner;

    readerDiv.style.display = 'block';
    if(scanner) scanner.stop().catch(e=>{});
    scanner = new Html5Qrcode("qrReader");

        let found = DB.lots.find(l=>l.id===decoded || l.name===decoded);

    }, err=>console.warn(err));
